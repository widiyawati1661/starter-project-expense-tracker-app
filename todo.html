<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Finn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Tracker Finn</h1>
    <select name="jenisTransaksi" id="tipeMya">
        <option value="pemasukan">Pemasukan</option>
        <option value="pengeluaran">Pengeluaran</option>
    </select>
    <input type="text" id="deskripsiMya" placeholder="Transaksi apa hari ini?">
    <input type="number" id="jumlahMya" placeholder="Jumlahnya">
    <button id="tombolTambahMya">Tambah Transaksi</button>
    <button id="tombolHapusMya">Hapus Transaksi</button>
    
    <hr>
    <label for="filter">Filter:</label>
    <select name="filterKategori" id="kategoriMya">
        <option value="semua">Semua Transaksi</option>
        <option value="pemasukan">Pemasukan</option>
        <option value="pengeluaran">Pengeluaran</option>
    </select>
    <h2>Total Saldo Kamu: Rp. <span id="totalMya"></span></h2>
    <ul id="listTransaksiMya"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
